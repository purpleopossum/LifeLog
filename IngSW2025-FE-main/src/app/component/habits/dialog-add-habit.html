<div class="habit-dialog">
  <form class="habit-form" #form="ngForm">
    <div class="title">
      <input type="text" matInput [(ngModel)]="title" name="title" maxlength="26" placeholder="TITLE" required/>
    </div>
    <div class="description">
      <textarea id="description"  [(ngModel)]="description" name="description" maxlength="100" placeholder="DESCRIPTION"></textarea>
    </div>
    <select matInput [(ngModel)]="partOfDay" name="partOfDay" >
        <option value="Any" disabled selected hidden>Periodo del Giorno</option>
        <option value="Any">QUALSIASI</option>
        <option value="Morning">MATTINA</option>
        <option value="Evening">POMERIGGIO</option>
        <option value="Night">SERA</option>
      </select>
    <div class="actions">
      <button type="button" (click)="onNoClick()">Annulla</button>
      <button type="submit" [disabled]="form.invalid" (click)="save()">Salva</button>
    </div>
  </form>
</div>
