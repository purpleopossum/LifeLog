<app-day-carousel
  [currentDate]="today"
  (dateChanged)="onDateChanged($event)">
</app-day-carousel>

<!-- FILTRI -->
<div class="filter-section">

  <div class="habit-filter-buttons">
    <button [class.active]="selectedFilter === 'All'" (click)="onFilterChanged('All')">
        <img src="all.png" alt="filter-all" style="height:20px; width:20px;">
    </button>

    <button [class.active]="selectedFilter === 'Morning'" (click)="onFilterChanged('Morning')">
      <img src="filter-morning.png" alt="morning" style="height:20px; width:20px;">
    </button>

    <button [class.active]="selectedFilter === 'Evening'" (click)="onFilterChanged('Evening')">
      <img src="filter-evening.png" alt="evening" style="height:20px; width:20px;">
    </button>

    <button [class.active]="selectedFilter === 'Night'" (click)="onFilterChanged('Night')">
      <img src="filter-night.png" alt="night" style="height:20px; width:20px;">
    </button>
  </div>

  <div class="filter-title">
    <h2>Filter: {{ selectedFilter }}</h2>
    <h2>Status: {{ selectedStatus }}</h2>
  </div>

  <div class="habit-filter-buttons">
    <button [class.active]="selectedStatus === 'All'" (click)="onStatusChanged('All')">All</button>
    <button [class.active]="selectedStatus === 'COMPLETED'" (click)="onStatusChanged('COMPLETED')">Completed</button>
    <button [class.active]="selectedStatus === 'SKIPPED'" (click)="onStatusChanged('SKIPPED')">Skipped</button>
  </div>

</div>

<!-- HABITS LIST -->
<div class="habit-card-container">

  <div class="habit-card" *ngFor="let habit of filteredHabits; trackBy: trackByHabitId">

    <ng-container *ngIf="habit.currentCheckin as checkin; else noCheckin">

      <ng-container *ngIf="editingCheckinId === checkin.id && editingCheckinClone">

        <textarea
          [(ngModel)]="editingCheckinClone.note"
          placeholder="Aggiungi una nota..."
          class="note"
          maxlength="140">
        </textarea>

        <div class="mood">
          <img src="crying.png">
          <img src="sad.png">
          <img src="neutral.png">
          <img src="happy.png">
          <img src="laughing.png">
        </div>

        <input
          type="range"
          min="1"
          max="5"
          [(ngModel)]="editingCheckinClone.mood"
          class="slider">

        <div class="actions">
          <button type="button" (click)="editingCheckinId = null; editingCheckinClone = null;">
            Cancel
          </button>

          <button type="button" (click)="saveCheckinEdit()">
            Save
          </button>
        </div>

      </ng-container>

      <ng-container *ngIf="editingCheckinId !== checkin.id">

        <div class="title-section"
          [class.completed-title]="checkin.status === 'COMPLETED'"
          [class.skipped-title]="checkin.status === 'SKIPPED'">

          <img class="time" [src]="habit.partOfDay + '.png'">

          <h3>{{ habit.title }}</h3>

          <img class="edit" src="Edit.png" (click)="openEditDialog(habit)">
        </div>

        <p class="description">
          {{ habit.description || 'No description' }}
        </p>

        <div class="actions">

          <button type="button" (click)="deleteItem(checkin.id!)">
            <img class="time" src="go-back.png">
          </button>

          <button type="button" (click)="startEditing(checkin)">            
            <img class="time" src="note.png">
          </button>

        </div>

      </ng-container>

    </ng-container>

    <ng-template #noCheckin>

      <div class="title-section">
        <img class="time" [src]="habit.partOfDay + '.png'">

        <h3>{{ habit.title }}</h3>

        <img class="edit" src="Edit.png" (click)="openEditDialog(habit)">
      </div>

      <p class="description">
        {{ habit.description || 'No description' }}
      </p>

      <div class="actions">

        <button type="button" (click)="updateCheckin(habit, 'SKIPPED')">
          <img class="time" src="skip.png">
        </button>

        <button type="button" (click)="updateCheckin(habit, 'COMPLETED')">
          <img class="time" src="checkmark.png">
        </button>

      </div>

    </ng-template>

  </div>

</div>

<div class="add-habit-container">
  
  @if (showAddMenu) {
    <div class="add-habit-popup">
      <button type="button" class="popup-option" (click)="selectPremadeHabits()">
        <span>Choose premade habits</span>
      </button>
      
      <button type="button" class="popup-option" (click)="selectCustomHabit()">
        <span>Create a Habit</span>
        <!-- Badge Visivo Premium se l'utente non lo è -->
        @if (!currentUser?.premium) {
          <span class="premium-badge">PRO</span>
        }
      </button>
    </div>
  }

  <button class="add-habit" (click)="toggleAddMenu($event)">
    Add Habit
  </button>
  
</div>

@if (showAddMenu) {
  <div class="menu-overlay" (click)="closeAddMenu()"></div>
}
